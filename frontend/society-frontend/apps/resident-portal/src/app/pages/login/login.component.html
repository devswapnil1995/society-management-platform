<div class="flex flex-col gap-3 p-4 max-w-sm mx-auto">
    <h2 class="text-xl font-bold">Login</h2>

    <input [(ngModel)]="email" placeholder="Email" class="border p-2" />
    <input [(ngModel)]="password" type="password" placeholder="Password" class="border p-2" />

    <button (click)="login()" class="bg-blue-500 text-white p-2">
        Login
    </button>
</div>
